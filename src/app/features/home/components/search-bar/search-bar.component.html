<div class="search-bar">
  <div class="search-container">
    <input 
      type="text"
      class="search-input"
      placeholder="Buscar cidade..."
      [value]="searchQuery()"
      (input)="onSearchInput($event)"
      (blur)="closeSuggestions()"
      (keyup.enter)="onSearch()"
    />
    <button class="search-btn" (click)="onSearch()" type="button">
      <lucide-icon [img]="SearchIcon" [size]="20"></lucide-icon>
    </button>

    <!-- Autocomplete Suggestions -->
    @if (showSuggestions() && suggestions() && suggestions().length > 0) {
      <div class="suggestions">
        @for (city of suggestions(); track city.id) {
          <div class="suggestion-item" (click)="selectCity(city)">
            <div class="city-name">{{ city.name }}</div>
            <div class="city-details">
              {{ city.admin1 ? city.admin1 + ', ' : '' }}{{ city.country }}
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
